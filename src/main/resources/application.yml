spring:
  main:
    lazy-initialization: true
  profiles:
    active: dev
  application:
    name: car-parts-marketplace

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  file:
    name: logs/application.log
  level:
    com.recicar.marketplace: INFO
    org.springframework.security: DEBUG

---
spring:
  config:
    activate:
      on-profile: dev
  
  datasource:
    # currentSchema=recicar: en PostgreSQL 15+ el rol suele no tener CREATE en "public";
    # un esquema propio se crea con Flyway (create-schemas) si el usuario es dueño de la BD.
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/marketplace_dev?currentSchema=recicar}
    username: ${DATABASE_USERNAME:marketplace_user}
    password: ${DATABASE_PASSWORD:marketplace_pass}
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: recicar
        
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true
    clean-disabled: false
    create-schemas: true
    default-schema: recicar
    schemas:
      - recicar
    
  thymeleaf:
    cache: false
    
server:
  error:
    include-stacktrace: on_param
  servlet:
    session:
      persistent: false

# Checkout: ex-VAT line totals; VAT and service fee applied in CartPricingService
app:
  checkout:
    vat-rate: 0.21
    service-fee-rate: 0.02
  support:
    # Shown in footer / help; contact form notifications are directed here when email integration is added
    email: help@recicar.es
  company:
    display-name: "ReciCar"
    legal-name: "recicar.es"
    copyright-years: "2014-2026"
    tagline: "Recambio de desguace con trazabilidad, envío en la UE y soporte en tu idioma."
    address: "España — datos fiscales y de contacto en la facturación o aviso legal."
    phone: ""
    social:
      facebook: "https://www.facebook.com/ovoko"
      youtube: "https://www.youtube.com/@ovokocom"
      instagram: "https://www.instagram.com/ovokocom"
  # Store prices include IVA de referencia (España); se recalcula al cambiar región/IVA en UI
  market:
    default-region: ES
    reference-vat: 0.21
    regions:
      - code: ES
        name: España
        vat: 0.21
      - code: FR
        name: France
        vat: 0.20
      - code: DE
        name: Deutschland
        vat: 0.19
      - code: IT
        name: Italia
        vat: 0.22
      - code: PT
        name: Portugal
        vat: 0.23
      - code: NL
        name: Países Bajos
        vat: 0.21
      - code: PL
        name: Polonia
        vat: 0.23
      - code: AT
        name: Austria
        vat: 0.20
      - code: BE
        name: Bélgica
        vat: 0.21
      - code: CZ
        name: "Rep. Checa"
        vat: 0.21
  shipping:
    dpd:
      brand: "DPD (envío EU)"

logging:
  file:
    name: logs/recicar-dev.log
  level:
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

---
# Profile for local Cucumber runs (cukeLocalRun): in-memory H2, no external DB required
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:mem:recicar_local;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  thymeleaf:
    cache: false

server:
  error:
    include-stacktrace: on_param

logging:
  level:
    com.recicar.marketplace: INFO

---
# Profile for remote Cucumber runs (cukeRemote): PostgreSQL on a server in your network
# Set DATABASE_HOST to your Linux server IP/hostname, and optionally DATABASE_PORT, DATABASE_NAME, etc.
spring:
  config:
    activate:
      on-profile: remote

  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:marketplace_dev}?currentSchema=recicar
    username: ${DATABASE_USERNAME:marketplace_user}
    password: ${DATABASE_PASSWORD:marketplace_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 10000
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: recicar

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true
    create-schemas: true
    default-schema: recicar
    schemas:
      - recicar

  thymeleaf:
    cache: false

server:
  error:
    include-stacktrace: on_param

logging:
  level:
    com.recicar.marketplace: INFO

---
spring:
  config:
    activate:
      on-profile: test
  # In-memory H2 for unit tests (MockMvc, @SpringBootTest). Do not use empty DATABASE_URL here — it would win over defaults.
  datasource:
    url: jdbc:h2:mem:recicar_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false
    locations: classpath:db/migration

  thymeleaf:
    cache: false

server:
  error:
    include-stacktrace: never

logging:
  file:
    name: logs/recicar-test.log
  level:
    com.recicar.marketplace: INFO

# Test: PostgreSQL en la misma red que la app (p. ej. servicio Dokploy / Docker). Sin SSL interno suele bastar jdbc:postgresql://host:5432/db

---
spring:
  config:
    activate:
      on-profile: prod
      
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      
  jpa:
    hibernate:
      ddl-auto: validate
      show-sql: false
      properties:
        hibernate:
          jdbc:
            batch_size: 20
          order_inserts: true
          order_updates: true
          batch_versioned_data: true
    
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true
    
  thymeleaf:
    cache: true
    enabled: true
    
  security:
    require-ssl: false  # Northflank handles SSL termination

# Prod: PostgreSQL gestionado; si el proveedor exige TLS, añade sslmode=require (u otros parámetros) en DATABASE_URL

server:
  port: ${SERVER_PORT:8080}
  error:
    include-stacktrace: never
    include-message: always
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  health:
    db:
      enabled: true
    diskspace:
      enabled: true

logging:
  file:
    name: logs/recicar-prod.log
  level:
    com.recicar.marketplace: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate.SQL: WARN