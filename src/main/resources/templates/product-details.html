<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" class="no-js" lang="es">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title th:text="${pageTitle} ?: 'ReciCar — Detalle de producto'">ReciCar — Detalle de producto</title>
    <meta name="description" th:content="${productSeoDescription}">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="canonical" th:if="${canonicalProductUrl != null}" th:href="${canonicalProductUrl}">

    <!-- Open Graph -->
    <meta property="og:type" content="product">
    <meta property="og:title" th:content="${pageTitle}">
    <meta property="og:description" th:content="${productSeoDescription}">
    <meta property="og:url" th:if="${canonicalProductUrl != null}" th:content="${canonicalProductUrl}">
    <meta property="og:image" th:if="${ogImageUrl != null && !#strings.isEmpty(ogImageUrl)}" th:content="${ogImageUrl}">
    <meta th:if="${detail != null and detail.price != null}" property="product:price:amount" th:content="${detail.price.stripTrailingZeros().toPlainString()}">
    <meta property="product:price:currency" content="EUR">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" th:content="${pageTitle}">
    <meta name="twitter:description" th:content="${productSeoDescription}">
    <meta name="twitter:image" th:if="${ogImageUrl != null && !#strings.isEmpty(ogImageUrl)}" th:content="${ogImageUrl}">

    <link rel="shortcut icon" type="image/x-icon" href="assets/img/favicon.ico">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/owl.carousel.min.css">
    <link rel="stylesheet" href="assets/css/slick.css">
    <link rel="stylesheet" href="assets/css/magnific-popup.css">
    <link rel="stylesheet" href="assets/css/font.awesome.css">
    <link rel="stylesheet" href="assets/css/ionicons.min.css">
    <link rel="stylesheet" href="assets/css/animate.css">
    <link rel="stylesheet" href="assets/css/jquery-ui.min.css">
    <link rel="stylesheet" href="assets/css/slinky.menu.css">
    <link rel="stylesheet" href="assets/css/plugins.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" th:href="@{/css/product-detail-page.css}">

    <link rel="preload" as="image" fetchpriority="high"
          th:if="${detail != null and detail.productImageUrls != null and !detail.productImageUrls.isEmpty()}"
          th:href="${detail.productImageUrls[0]}">

    <script type="application/ld+json" th:if="${productJsonLd != null}" th:utext="${productJsonLd}"></script>
    <script type="application/ld+json" th:if="${breadcrumbJsonLd != null}" th:utext="${breadcrumbJsonLd}"></script>

    <script src="assets/js/vendor/modernizr-3.7.1.min.js"></script>
</head>
<body>

<th:block th:replace="fragments/_header :: header"></th:block>
<th:block th:replace="fragments/_offcanvasmenu :: offcanvasmenu"></th:block>

<main class="product-detail-scope" role="main">

    <th:block th:replace="fragments/_product-detail :: breadcrumb"></th:block>

    <div class="product_details mt-15 mb-40">
        <div class="container">
            <header class="row mb-3">
                <div class="col-12">
                    <h1 class="h3" th:text="${detail.title}">Producto</h1>
                    <div class="d-flex flex-wrap align-items-center gap-2 mt-2">
                        <span class="current_price h5 mb-0"
                              th:text="${@priceView.formatEur(clientPreferences, detail.price)}">€</span>
                        <span class="badge bg-light text-dark border"
                              th:if="${detail.condition}"
                              th:text="${detail.condition}">USED</span>
                    </div>
                </div>
            </header>

            <div class="row align-items-start">
                <div class="col-lg-8 col-md-12 pd-main-col">

                    <th:block th:replace="fragments/_product-detail :: imageGallery"></th:block>

                    <section class="product_d_info mb-4" aria-labelledby="pd-desc-heading">
                        <h2 id="pd-desc-heading" class="h6 text-uppercase text-muted">Descripción</h2>
                        <div class="product_info_content">
                            <p class="mb-0" th:if="${detail.description != null and !#strings.isEmpty(detail.description)}"
                               th:text="${detail.description}">—</p>
                            <p class="mb-0 text-muted" th:if="${detail.description == null or #strings.isEmpty(detail.description)}">
                                Sin descripción extendida para este producto.
                            </p>
                        </div>
                    </section>

                    <th:block th:replace="fragments/_product-detail :: specsTables"></th:block>
                    <th:block th:replace="fragments/_product-detail :: vehicleCompatibility"></th:block>
                    <th:block th:replace="fragments/_product-detail :: vehicleDonorGallery"></th:block>
                </div>

                <div class="col-lg-4 col-md-12">
                    <th:block th:replace="fragments/_product-detail :: purchasePanel"></th:block>
                    <th:block th:replace="fragments/_product-detail :: sellerCard"></th:block>
                </div>
            </div>
        </div>
    </div>

    <th:block th:replace="fragments/_product-detail :: relatedProducts"></th:block>

    <th:block th:replace="fragments/_product-detail :: mobilePurchaseBar"></th:block>
</main>

<th:block th:replace="fragments/_calltoaction :: calltoaction"></th:block>
<th:block th:replace="fragments/_footer :: footer"></th:block>

<!-- modal area start-->
<div class="modal fade" id="modal_box" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <button type="button" class="close" data-bs-dismiss="modal" aria-label="Close">
                <span aria-hidden="true">&times;</span>
            </button>
            <div class="modal_body">
                <div class="container">
                    <div class="row">
                        <div class="col-lg-5 col-md-5 col-sm-12">
                            <div class="modal_tab">
                                <div class="tab-content product-details-large">
                                    <div class="tab-pane fade show active" id="tab1" role="tabpanel">
                                        <div class="modal_tab_img">
                                            <a href="#"><img src="assets/img/product/product1.jpg" alt=""></a>
                                        </div>
                                    </div>
                                    <div class="tab-pane fade" id="tab2" role="tabpanel">
                                        <div class="modal_tab_img">
                                            <a href="#"><img src="assets/img/product/product2.jpg" alt=""></a>
                                        </div>
                                    </div>
                                    <div class="tab-pane fade" id="tab3" role="tabpanel">
                                        <div class="modal_tab_img">
                                            <a href="#"><img src="assets/img/product/product3.jpg" alt=""></a>
                                        </div>
                                    </div>
                                    <div class="tab-pane fade" id="tab4" role="tabpanel">
                                        <div class="modal_tab_img">
                                            <a href="#"><img src="assets/img/product/product5.jpg" alt=""></a>
                                        </div>
                                    </div>
                                </div>
                                <div class="modal_tab_button">
                                    <ul class="nav product_navactive owl-carousel" role="tablist">
                                        <li>
                                            <a class="nav-link active" data-toggle="tab" href="#tab1" role="tab"
                                               aria-controls="tab1" aria-selected="false"><img
                                                    src="assets/img/product/product1.jpg" alt=""></a>
                                        </li>
                                        <li>
                                            <a class="nav-link" data-toggle="tab" href="#tab2" role="tab"
                                               aria-controls="tab2" aria-selected="false"><img
                                                    src="assets/img/product/product2.jpg" alt=""></a>
                                        </li>
                                        <li>
                                            <a class="nav-link button_three" data-toggle="tab" href="#tab3" role="tab"
                                               aria-controls="tab3" aria-selected="false"><img
                                                    src="assets/img/product/product3.jpg" alt=""></a>
                                        </li>
                                        <li>
                                            <a class="nav-link" data-toggle="tab" href="#tab4" role="tab"
                                               aria-controls="tab4" aria-selected="false"><img
                                                    src="assets/img/product/product5.jpg" alt=""></a>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-7 col-md-7 col-sm-12">
                            <div class="modal_right">
                                <div class="modal_title mb-10">
                                    <h2>Handbag feugiat</h2>
                                </div>
                                <div class="modal_price mb-10">
                                    <span class="new_price">$64.99</span>
                                    <span class="old_price">$78.99</span>
                                </div>
                                <div class="modal_description mb-15">
                                    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit.</p>
                                </div>
                                <div class="variants_selects">
                                    <div class="modal_add_to_cart">
                                        <form action="#">
                                            <input min="1" max="100" step="2" value="1" type="number">
                                            <button type="submit">add to cart</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- modal area end-->

<script src="assets/js/vendor/jquery-3.4.1.min.js"></script>
<script src="assets/js/popper.js"></script>
<script src="assets/js/bootstrap.min.js"></script>
<script src="assets/js/owl.carousel.min.js"></script>
<script src="assets/js/slick.min.js"></script>
<script src="assets/js/jquery.magnific-popup.min.js"></script>
<script src="assets/js/jquery.countdown.js"></script>
<script src="assets/js/jquery.ui.js"></script>
<script src="assets/js/jquery.elevatezoom.js"></script>
<script src="assets/js/isotope.pkgd.min.js"></script>
<script src="assets/js/slinky.menu.js"></script>
<script src="assets/js/plugins.js"></script>
<script src="assets/js/main.js"></script>
<script defer th:src="@{/js/product-detail-gallery.js}"></script>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const miniCartLink = document.querySelector('.mini_cart_wrapper a');
    if (miniCartLink) miniCartLink.setAttribute('href', '/cart');

    fetch('/api/cart/count')
        .then(r => r.json())
        .then(data => {
            const count = (data && typeof data.count === 'number') ? data.count : 0;
            document.querySelectorAll('.cart_quantity, #cart-count').forEach(el => el.textContent = count);
        })
        .catch(() => {});

    const form = document.getElementById('add-to-cart-form');
    if (form) {
        form.addEventListener('submit', function (e) {
            e.preventDefault();
            const qMobile = document.getElementById('quantity-input-mobile');
            const qDesktop = document.getElementById('quantity-input-desktop');
            if (qMobile && qDesktop) qDesktop.value = qMobile.value;
            const fd = new FormData(form);
            const body = new URLSearchParams(fd);
            fetch('/api/cart/items', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body
            }).then(r => {
                if (!r.ok) {
                    throw new Error('Failed to add item to cart');
                }
                return r.json();
            }).then(cart => {
                if (!cart) return;
                const total = (cart.items || []).reduce((sum, it) => sum + (it.quantity || 0), 0);
                document.querySelectorAll('.cart_quantity, #cart-count').forEach(el => el.textContent = total);
                fetch('/mini-cart', { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
                  .then(r => r.text())
                  .then(html => {
                      const container = document.querySelector('.mini_cart');
                      if (container) {
                          const parser = new DOMParser();
                          const doc = parser.parseFromString(html, 'text/html');
                          const miniCartContent = doc.querySelector('.mini_cart');
                          if (miniCartContent) {
                              container.innerHTML = miniCartContent.innerHTML;
                          }
                      }
                      document.querySelectorAll('.mini_cart,.off_canvars_overlay').forEach(el => el.classList.add('active'));
                  }).catch(() => {});
                const btnDesk = document.getElementById('pd-desktop-add-submit');
                const btnMob = document.getElementById('pd-mobile-add-submit');
                function flash(btn) {
                    if (!btn) return;
                    const old = btn.textContent;
                    btn.disabled = true; btn.textContent = '¡Añadido!';
                    setTimeout(() => { btn.disabled = false; btn.textContent = old; }, 1200);
                }
                flash(btnDesk); flash(btnMob);
            }).catch(err => {
                console.error('Add to cart failed', err);
                alert('Failed to add item to cart. Please try again.');
            });
        });
    }
});
</script>
</body>
</html>
