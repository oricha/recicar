<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" class="no-js" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">Marcas — ReciCar</title>
    <link rel="shortcut icon" type="image/x-icon" href="/img/favicon.ico">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/font.awesome.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/assets/css/technical-marketplace.css">
</head>
<body>
<th:block th:replace="fragments/_header :: header"></th:block>
<th:block th:replace="fragments/_offcanvasmenu :: offcanvasmenu"></th:block>

<div class="breadcrumbs_area">
    <div class="container">
        <nav class="breadcrumb_content" aria-label="Ruta de navegación">
            <ul>
                <li><a href="/">Inicio</a></li>
                <li><span class="current" aria-current="page">Marcas de vehículo</span></li>
            </ul>
        </nav>
    </div>
</div>

<div class="container py-4">
    <h1>Marcas</h1>
    <form method="get" action="/marcas" class="row g-2 mb-4">
        <input type="hidden" name="page" value="0">
        <div class="col-md-6">
            <input type="search" name="q" class="form-control" placeholder="Filtrar por nombre"
                   th:value="${searchQuery}">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Buscar</button>
        </div>
    </form>
    <p class="text-muted small" th:if="${brandTotal > 0}">
        Mostrando <span th:text="${brands.size()}">0</span> de <span th:text="${brandTotal}">0</span> marcas
    </p>
    <div class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-2">
        <div class="col" th:each="b : ${brands}">
            <a th:href="@{/marcas/{s}(s=${b.slug})}" class="btn btn-outline-secondary w-100 text-truncate" th:text="${b.name}">Marca</a>
        </div>
    </div>

    <nav th:if="${brandTotalPages > 1}" class="mt-4" aria-label="Paginación de marcas">
        <ul class="pagination justify-content-center flex-wrap mb-0">
            <li class="page-item" th:classappend="${!brandHasPrev} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/marcas(q=${searchQuery},page=${brandPage - 1})}"
                   tabindex="-1">Anterior</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link"
                      th:text="|Página ${brandPage + 1} de ${brandTotalPages}|">Página</span>
            </li>
            <li class="page-item" th:classappend="${!brandHasNext} ? 'disabled'">
                <a class="page-link" th:href="@{/marcas(q=${searchQuery},page=${brandPage + 1})}">Siguiente</a>
            </li>
        </ul>
    </nav>
</div>

<th:block th:replace="fragments/_calltoaction :: calltoaction"></th:block>
<th:block th:replace="fragments/_footer :: footer"></th:block>
<script src="/js/vendor/jquery-3.4.1.min.js"></script>
<script src="/js/bootstrap.min.js"></script>
<script src="/assets/js/main.js"></script>
<script src="/assets/js/technical-ux.js"></script>
</body>
</html>
