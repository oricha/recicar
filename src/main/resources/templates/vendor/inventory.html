<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/new-base :: html}">
<head>
    <th:block th:fragment="head-extra">
        <title>Inventory - Car Parts Marketplace</title>
    </th:block>
</head>
<body>
<div th:fragment="content">
    <section class="vendor_inventory_area py-5">
        <div class="container">
            <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
                <div>
                    <h1 class="h3 mb-0">Inventory</h1>
                    <p class="text-muted mb-0" th:text="${vendor.businessName}">Store</p>
                </div>
                <div>
                    <a class="btn btn-outline-secondary me-2" th:href="@{/vendor/dashboard}">Dashboard</a>
                    <a class="btn btn-outline-secondary me-2" th:href="@{/vendor/orders}">Orders</a>
                    <a class="btn btn-primary" th:href="@{/vendor/products/new}">Add product</a>
                </div>
            </div>

            <div th:if="${products.empty}" class="alert alert-info">You have no products yet.</div>

            <div th:if="${!products.empty}" class="table-responsive">
                <table class="table table-striped align-middle">
                    <thead>
                    <tr>
                        <th>Name</th>
                        <th>SKU / part #</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Active</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${products.content}">
                        <td th:text="${p.name}">—</td>
                        <td th:text="${p.partNumber != null ? p.partNumber : '—'}">—</td>
                        <td th:text="${#numbers.formatDecimal(p.price, 1, 2)} + ' €'">0</td>
                        <td th:text="${p.stockQuantity}">0</td>
                        <td th:text="${p.active} ? 'Yes' : 'No'">—</td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-primary" th:href="@{/vendor/products/{id}/edit(id=${p.id})}">Edit</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${products.totalPages > 1}" aria-label="Inventory pagination" class="mt-3">
                <ul class="pagination">
                    <li class="page-item" th:classappend="${products.first} ? ' disabled'">
                        <a class="page-link" th:href="@{/vendor/inventory(page=${products.number - 1}, size=${products.size})}">Previous</a>
                    </li>
                    <li class="page-item disabled">
                        <span class="page-link" th:text="${'Page ' + (products.number + 1) + ' of ' + products.totalPages}">1</span>
                    </li>
                    <li class="page-item" th:classappend="${products.last} ? ' disabled'">
                        <a class="page-link" th:href="@{/vendor/inventory(page=${products.number + 1}, size=${products.size})}">Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    </section>
</div>
</body>
</html>
