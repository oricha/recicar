<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" class="no-js" lang="es">

<head>
    <meta charset="utf-8">
    <title>Recicar — Iniciar sesión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/x-icon" href="/img/favicon.ico">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<th:block th:replace="fragments/_header :: header"></th:block>
<th:block th:replace="fragments/_offcanvasmenu :: offcanvasmenu"></th:block>

<div class="breadcrumbs_area">
    <div class="container">
        <div class="breadcrumb_content">
            <ul>
                <li><a href="/">inicio</a></li>
                <li>Iniciar sesión</li>
            </ul>
        </div>
    </div>
</div>

<div class="customer_login mt-32 mb-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="account_form">
                    <h2>Iniciar sesión</h2>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}" role="alert"></div>
                    <div th:if="${message}" class="alert alert-success" th:text="${message}" role="status"></div>

                    <form th:action="@{/login}" method="post" th:object="${loginForm}" class="mb-4" id="loginForm">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <p>
                            <label for="email">Correo electrónico <span>*</span></label>
                            <input id="email" type="email" autocomplete="username" th:field="*{email}" required>
                        </p>
                        <p>
                            <label for="password">Contraseña <span>*</span></label>
                            <input id="password" type="password" autocomplete="current-password" th:field="*{password}" required>
                        </p>
                        <div class="login_submit d-flex align-items-center justify-content-between flex-wrap gap-2">
                            <a href="/forgot-password">¿Olvidaste tu contraseña?</a>
                            <label class="mb-0 d-flex align-items-center">
                                <input id="remember" type="checkbox" name="remember-me" class="me-2">
                                Recuérdame
                            </label>
                        </div>
                        <div class="mt-3">
                            <button type="submit" class="btn btn-primary">Entrar</button>
                            <a href="/register" class="btn btn-outline-secondary ms-2">Crear cuenta</a>
                        </div>
                    </form>

                    <p class="text-muted small">O continúa con</p>
                    <div class="d-flex flex-column flex-sm-row gap-2">
                        <a class="btn btn-light border" th:href="@{/oauth2/authorization/google}" style="color:#4285F4;font-weight:600">Google</a>
                        <a class="btn btn-light border" th:href="@{/oauth2/authorization/facebook}" style="color:#1877F2;font-weight:600">Facebook</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="fragments/_calltoaction :: calltoaction"></th:block>
<th:block th:replace="fragments/_footer :: footer"></th:block>
<script src="/js/vendor/jquery-3.4.1.min.js"></script>
<script src="/js/bootstrap.min.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
