spring:
  datasource:
    url: ${TEST_DATABASE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/marketplace_dev?currentSchema=recicar}}
    username: ${TEST_DATABASE_USERNAME:${DATABASE_USERNAME:marketplace_user}}
    password: ${TEST_DATABASE_PASSWORD:${DATABASE_PASSWORD:marketplace_pass}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        default_schema: recicar_test
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true
    create-schemas: true
    default-schema: recicar_test
    schemas:
      - recicar_test
  thymeleaf:
    cache: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

logging:
  level:
    root: WARN
    org.springframework: WARN
    com.recicar.marketplace: INFO
